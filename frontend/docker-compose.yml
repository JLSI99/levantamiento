services:
  frontend:
    build:
      context: .
      dockerfile: dockerfile
    container_name: ecosistema-frontend
    ports:
      - "8080:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./nginx.conf.template:/etc/nginx/templates/nginx.conf.template:ro
      - ./css:/usr/share/nginx/html/css:ro
      - ./src:/usr/share/nginx/html/src:ro
    environment:
      - BFF_UPSTREAM_URL=http://bff_orquestador:8000
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    networks:
      - backend_net
    restart: always

networks:
  backend_net:
    external: true