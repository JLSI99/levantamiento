version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: dockerfile
    container_name: ecosistema-frontend
    ports:
      - "8080:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./css:/usr/share/nginx/html/css:ro
      - ./src:/usr/share/nginx/html/src:ro
    networks:
      - backend_net
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    restart: always

networks:
  backend_net:
    external: true