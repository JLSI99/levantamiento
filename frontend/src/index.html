<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITSC - Sistema Unificado de Resguardos</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <h2>INSTITUTO TECNOLÓGICO SUPERIOR DE COMALCALCO</h2>
                <p>Ecosistema de Gestión Patrimonial e Inventarios — 2026</p>
            </div>
            
            <form id="form-login" novalidate>
                <div class="form-group">
                    <label for="identifier">Usuario o Correo Institucional</label>
                    <input type="text" id="identifier" name="identifier" required autocomplete="username" placeholder="ejemplo@itsc.edu.mx">
                </div>
                
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="••••••••">
                </div>

                <div id="error-feedback" class="error-box hidden"></div>
                
                <button type="submit" id="btn-submit" class="btn-primary">
                    <span>Iniciar Sesión</span>
                </button>
            </form>
        </div>
    </div>

    <script src="mock-server.js"></script> 
    <script src="auth.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const form = document.getElementById("form-login");
            const feedback = document.getElementById("error-feedback");
            const btn = document.getElementById("btn-submit");

            form.addEventListener("submit", async (e) => {
                e.preventDefault();
                feedback.classList.add("hidden");
                feedback.textContent = "";
                
                const idVal = document.getElementById("identifier").value.trim();
                const passVal = document.getElementById("password").value;

                if (!idVal || !passVal) {
                    feedback.textContent = "Todos los campos son obligatorios.";
                    feedback.classList.remove("hidden");
                    return;
                }

                try {
                    btn.disabled = true;
                    btn.textContent = "Verificando identidad...";
                    
                    // Ejecuta el flujo atómico contra el servidor proxy simulado
                    await window.AuthService.login(idVal, passVal);
                    
                    // Redirección relativa gobernada por el contexto local de carpetas
                    window.location.href = "dashboard.html";
                } catch (error) {
                    btn.disabled = false;
                    btn.textContent = "Iniciar Sesión";
                    feedback.textContent = error.message;
                    feedback.classList.remove("hidden");
                }
            });
        });
    </script>
</body>
</html>
