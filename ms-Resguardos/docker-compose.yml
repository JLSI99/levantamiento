services:
  api-ms-resguardo:
    build: ./
    container_name: ms_resguardo_api
    env_file: 
      - .env_code
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./:/app
    ports:
      - ${SERVER_IP}:${SERVER_PORT}:8000
    depends_on:
       db:
        condition: service_healthy
    networks:
        - backend_net
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: db_resguardo
    env_file: 
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    volumes:
      - ./db-data-resguardo:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
        - backend_net
    restart: unless-stopped

  pgadmin:
    container_name: pgadmin_resguardo
    image: dpage/pgadmin4
    ports:
      - ${PGADMIN_IP}:${PGADMIN_PORT}:80
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASS}
    volumes:
      - ./pgadmin-data-resguardo/:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy
    networks:
        - backend_net
    restart: unless-stopped

networks:
  backend_net:
    external: true