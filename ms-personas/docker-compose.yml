services:
  api-ms-personas:
    build: 
      context: ./
      dockerfile: dockerfile
    container_name: ms_personas_api
    env_file: 
      - .env_code
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./src:/app/src
    ports:
      - "${SERVER_IP}:${SERVER_PORT}:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend_net
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: db_personas
    env_file: 
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - db_data_personas:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - backend_net
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_personas
    ports:
      - "${PGADMIN_IP}:${PGADMIN_PORT}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASS}
      
    logging:
      driver: "none"
    volumes:
      - pgadmin_data_personas:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy 
    networks:
      - backend_net
    restart: unless-stopped

volumes:
  db_data_personas:
    driver: local
  pgadmin_data_personas:
    driver: local

networks:
  backend_net:
    external: true