services:
  api-ms-usuarios:
    build: ./
    container_name: ms_usuarios_api
    env_file: 
      - .env_code
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./:/app
    ports:
      - ${SERVER_IP}:${SERVER_PORT}:8000
    depends_on:
      db:
        condition: service_healthy  # 
      redis:
        condition: service_started
    networks:
      - backend_net
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: db_usuarios
    env_file: 
      - .env
    healthcheck:
      test: ["CMD-SHELL", "psql -U $${POSTGRES_USER} -d $${POSTGRES_DB} -c 'SELECT 1'"]
      interval: 3s       #
      timeout: 5s        #
      retries: 5         #
      start_period: 9s   # 
    volumes:
      - ./db-data-usuarios:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - backend_net
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_usuarios
    ports:
      - ${PGADMIN_IP}:${PGADMIN_PORT}:80
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASS}
    volumes:
      - ./pgadmin-data-usuarios/:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy #
    networks:
      - backend_net 
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: itsc_redis_shared
    networks:
      - backend_net
    restart: unless-stopped  

networks:
  backend_net:
    external: true